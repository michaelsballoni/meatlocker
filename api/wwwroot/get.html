<!DOCTYPE html>
<html lang="en-us">
<head>
	<title>Meet Locker - Retrieve Text</title>
	<link rel="stylesheet" href="style.css">
	<script>
		async function doRetrieve() {
            const form = document.getElementById("retrieveForm");
            const response = await fetch("api/get", { method: 'post', body: new FormData(form) });
            form.style.display = "none";
            if (response.ok) {
                document.getElementById("text").value = await response.text();
                document.getElementById("output").style.display = "";
            }
            else {
                alert("Error occurred retrieving text.  Double check your key and secret and try again.");
                form.style.display = '';
                document.getElementById("output").style.display = "";
            }
		}

       function doCopy() {
            navigator.clipboard.writeText(document.getElementById('text').value);
            alert('Text copied!');
		}
	</script>
</head>
<body>
	<table width="100%" height="100%">
		<tr valign="middle">
			<td align=center>
				<table cellspacing="0" cellpadding="0">
					<tr>
						<td align="center">
							<img style="width: min(90vw, 640px)" src="header.png" alt="Meet Locker Store" />
						</td>
					</tr>
					<tr><td align="left"><h1>Retrieve Text</h1></td></tr>
					<tr>
						<td align="left">
							<form id=retrieveForm method="post" onsubmit="doRetrieve();  return false">
								What key to unlock the locker?<br>
								<input size="80" name="key"><br>
								<br>

								What password to retrieve the text?<br>
								<input size="80" name="pwd"><br>
								<br>

								<div align="center">
									<button onclick="window.location = 'index.html'">Close</button>
									<button onclick="doRetrieve()">Retrieve Text</button>
								</div>
							</form>

							<div id="output" style="display: none">
								<p id="msg">Text retrieved:</p>
								<textarea id="text" name="text" cols="80" rows="10"></textarea>
								<form onsubmit="return false">
									<div align="center">
										<button id="copyCloseButton" onclick="window.location = 'index.html'">Close</button>
										<button id="copyButton" onclick="doCopy()">Copy Text</button>
									</div>
								</form>
							</div>
						</td>
					</tr>
				</table>
				<br>
				Copyright &copy; Michael Balloni.  2026.  All rights reserved.
			</td>
		</tr>
	</table>
</body>
</html>
