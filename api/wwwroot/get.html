<html>
<head>
	<title>Meet Locker - Retrieve Text</title>
	<style>
		html, body {
			height: 100%
		}
	</style>
	<script>
		async function doRetrieve() {
			const form = document.forms[0];
			const response = await fetch("api/put", { method: 'post', body: new FormData(form) });
			if (response.ok) {
                alert("Text stored!");
                window.location = 'index.html';
			}
			else
				alert("Error occurred storing text!");
		}
	</script>
</head>
<body>
	<table width="100%" height="100%">
		<tr valign="middle">
			<td align=center>
				<h1>Retrieve Text - Meet Locker</h1>
				<table>
					<tr>
						<td align="left">
							<form method="post">
								Provide Key and Secret to retrieve the text:<br>
								<br>

								Key:<br>
								<input size="50" name="key"><br>
								<br>

								Secret:<br>
								<input size="50" name="pwd"><br>
								<br>

								<input type=button onclick="window.location = 'index.html'" value="Cancel">
								<input type="submit" onclick="doRetrieve()" value="Retrieve Text">

								<br>
								<br>

								Retrieved Text:
								<br />
								<textarea name="text" cols="50" rows="10"></textarea>
							</form>
						</td>
					</tr>
				</table>
			</td>
		</tr>
	</table>
</body>
</html>
