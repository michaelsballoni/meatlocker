<!DOCTYPE html>
<html lang="en-us">
<head>
	<title>Meet Locker - Retrieve Text</title>
	<style>
		html, body {
			height: 100%
		}
	</style>
	<script>
		async function doRetrieve() {
			const form = document.forms[0];
			const response = await fetch("api/get", { method: 'post', body: new FormData(form) });
			if (response.ok) {
                document.getElementById("output").innerHTML = "Text retrieved!";
                document.getElementById("text").value = await response.text();
                document.getElementById("copyButton").style.display = "";
			}
			else
				alert("Error occurred retrieving text.  Double check your key and secret and try again.");
		}
	</script>
</head>
<body>
	<table width="100%" height="100%">
		<tr valign="middle">
			<td align=center>
				<img style="width: min(90vw, 640px) " src="header.png" alt="Meet Locker Retrieve"/>
				<h1>Retrieve Text</h1>
				<table>
					<tr>
						<td align="left">
							<form method="post" onsubmit="return false">
								What key to unlock the locker?<br>
								<input size="80" name="key"><br>
								<br>

								What secret to open the text?<br>
								<input size="80" name="pwd"><br>
								<br>

								<input type=button onclick="window.location = 'index.html'" value="Cancel">
								<input type="submit" onclick="doRetrieve()" value="Retrieve Text">

								<br>
								<br>

								<div id="output"></div>
								<br />
								<textarea id="text" name="text" cols="80" rows="10"></textarea>
								<br />
								<input id="copyButton" type="button" value="Copy" style="display: none" onclick="navigator.clipboard.writeText(document.getElementById('text').value)" />
							</form>
						</td>
					</tr>
				</table>
				Copyright &copy; Michael Balloni.  2026.  All rights reserved.
			</td>
		</tr>
	</table>
</body>
</html>
