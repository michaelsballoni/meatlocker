<!DOCTYPE html>
<html lang="en-us">
<head>
	<title>Meet Locker - Store Text</title>
	<style>
		html, body {
			height: 100%
		}
	</style>
	<script>
		async function doStore() {
			const form = document.forms[0];
			const response = await fetch("api/put", { method: 'post', body: new FormData(form) });
			if (response.ok) {
				document.getElementById("output").innerHTML = "Text stored!<br><br>Here is the key needed to retrieve the text:<br><br>";
				document.getElementById("key").innerText = document.createTextNode(await response.text()).textContent;
				document.getElementById("copyButton").style.display = "";
				document.getElementById("copyCloseButton").style.display = "";
			}
			else
				alert("Error occurred storing text.  Try again later.");
		}
	</script>
</head>
<body>
	<table width="100%" height="100%">
		<tr valign="middle">
			<td align=center>
				<h1>Store Text - Meet Locker</h1>
				<table>
					<tr>
						<td align="left">
							<form onsubmit="return false">
								What text to store?<br>
								<textarea name="text" cols="80" rows="10"></textarea>
								<br>
								<br>

								What password to secure the text?<br>
								<input name="pwd" size="80"><br>
								<br>

								<div align="right">
									<input type=button onclick="window.location = 'index.html'" value="Close">
									<input type="submit" onclick="doStore()" value="Store File">
								</div>
							</form>

							<div id="output"></div>
							<div id="key"></div>
							<br />
							<input id="copyCloseButton" type=button onclick="window.location = 'index.html'" value="Close" style="display: none">
							<input id="copyButton" type="button" value="Copy" style="display: none" onclick="navigator.clipboard.writeText(document.getElementById('key').innerText)" />
						</td>
					</tr>
				</table>
				Copyright &copy; Michael Balloni.  2026.  All rights reserved.
			</td>
		</tr>
	</table>
</body>
</html>
